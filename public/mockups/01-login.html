<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zippy — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
          colors: {
            'z-green': '#65B741', 'z-green-d': '#4d9630', 'z-green-l': '#E8F5E0',
            'z-navy': '#1B2A4A', 'z-navy-l': '#243556',
            'z-cyan': '#00BCD4', 'z-blue': '#2196F3',
            'z-page': '#F7F8FA', 'z-muted': '#94A3B8', 'z-border': '#E2E8F0',
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }

    /* Diagonal speed-line background pattern */
    .speed-bg {
      background: linear-gradient(135deg, #1B2A4A 0%, #0d1829 60%, #111e38 100%);
      position: relative;
      overflow: hidden;
    }
    .speed-bg::before {
      content: '';
      position: absolute; inset: 0;
      background-image: repeating-linear-gradient(
        -55deg,
        transparent,
        transparent 40px,
        rgba(101,183,65,0.04) 40px,
        rgba(101,183,65,0.04) 41px
      );
    }
    .speed-bg::after {
      content: '';
      position: absolute; inset: 0;
      background-image: repeating-linear-gradient(
        -55deg,
        transparent,
        transparent 80px,
        rgba(0,188,212,0.03) 80px,
        rgba(0,188,212,0.03) 81px
      );
    }

    /* Green→cyan gradient text */
    .brand-gradient {
      background: linear-gradient(90deg, #65B741, #00BCD4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .btn-green {
      background: linear-gradient(135deg, #65B741, #4daa2a);
      box-shadow: 0 4px 20px rgba(101,183,65,0.35);
      transition: all 0.2s;
    }
    .btn-green:hover { background: linear-gradient(135deg, #72c84a, #55b830); box-shadow: 0 6px 25px rgba(101,183,65,0.45); transform: translateY(-1px); }
    .btn-green:active { transform: translateY(0); }

    input:focus { outline: none; ring: none; border-color: #65B741 !important; box-shadow: 0 0 0 3px rgba(101,183,65,0.15); }

    .role-card { transition: all 0.15s; cursor: pointer; }
    .role-card.active-sa { border-color: #65B741; background: rgba(101,183,65,0.07); color: #3d7a24; }
    .role-card.active-admin { border-color: #00BCD4; background: rgba(0,188,212,0.07); color: #007a8c; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card-anim { animation: fadeUp 0.5s ease both; }
  </style>
</head>
<body class="speed-bg min-h-screen flex items-center justify-center px-4">

  <div class="card-anim w-full max-w-md bg-white rounded-3xl shadow-2xl p-10 relative z-10">

    <!-- Logo -->
    <div class="flex flex-col items-center mb-8">
      <div class="flex items-center gap-3 mb-1">
        <!-- Slug SVG mark -->
        <svg width="42" height="32" viewBox="0 0 42 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="24" cy="20" rx="14" ry="10" fill="#65B741"/>
          <ellipse cx="24" cy="20" rx="14" ry="10" fill="url(#sg)" opacity="0.3"/>
          <circle cx="32" cy="14" r="6" fill="#65B741"/>
          <circle cx="34" cy="13" r="1.5" fill="#1B2A4A"/>
          <line x1="31" y1="9" x2="29" y2="5" stroke="#65B741" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="33" y1="8" x2="32" y2="4" stroke="#65B741" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="29" cy="4.5" r="1.5" fill="#65B741"/>
          <circle cx="32" cy="3.5" r="1.5" fill="#65B741"/>
          <!-- Speed lines -->
          <path d="M2 18 Q8 16 14 17" stroke="#2196F3" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
          <path d="M0 21 Q7 19 13 20" stroke="#00BCD4" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
          <path d="M4 24 Q9 22 15 23" stroke="#65B741" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
          <defs>
            <linearGradient id="sg" x1="10" y1="12" x2="38" y2="28" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#7dcf53"/>
              <stop offset="100%" stop-color="#4a9e2a"/>
            </linearGradient>
          </defs>
        </svg>
        <div>
          <div class="text-3xl font-extrabold tracking-tight leading-none brand-gradient">ZIPPY</div>
          <div class="text-[10px] font-semibold tracking-widest text-z-muted uppercase mt-0.5">Managed Services</div>
        </div>
      </div>
    </div>

    <div class="text-center mb-8">
      <h1 class="text-2xl font-bold text-z-navy tracking-tight">Welcome back</h1>
      <p class="text-sm text-z-muted mt-1">Sign in to your workspace</p>
    </div>

    <!-- Form -->
    <div class="space-y-5">
      <div class="space-y-1.5">
        <label class="text-xs font-semibold text-z-navy uppercase tracking-wider">Email Address</label>
        <input type="email" placeholder="name@company.com" value="sarah.chen@example.com"
          class="w-full h-11 px-4 rounded-xl border border-z-border bg-z-page text-z-navy text-sm transition-all" />
      </div>

      <div class="space-y-1.5">
        <label class="text-xs font-semibold text-z-navy uppercase tracking-wider">Full Name <span class="text-z-muted font-normal normal-case">(optional)</span></label>
        <input type="text" placeholder="Sarah Chen" value="Sarah Chen"
          class="w-full h-11 px-4 rounded-xl border border-z-border bg-z-page text-z-navy text-sm transition-all" />
      </div>

      <div class="space-y-1.5">
        <label class="text-xs font-semibold text-z-navy uppercase tracking-wider">Select Role</label>
        <div class="grid grid-cols-2 gap-3">
          <div class="role-card active-sa border-2 rounded-xl p-4 text-center">
            <div class="text-lg mb-1">🏗️</div>
            <div class="text-sm font-semibold">Solution Architect</div>
            <div class="text-[11px] text-z-muted mt-0.5">Design & quote</div>
          </div>
          <div class="role-card border-2 border-z-border rounded-xl p-4 text-center text-slate-500 hover:border-slate-300">
            <div class="text-lg mb-1">⚙️</div>
            <div class="text-sm font-semibold">Admin</div>
            <div class="text-[11px] text-z-muted mt-0.5">Manage catalog</div>
          </div>
        </div>
      </div>

      <button class="btn-green w-full h-12 rounded-xl text-white font-bold text-sm tracking-wide mt-2">
        Continue →
      </button>

      <p class="text-center text-xs text-z-muted pt-1">Demo login — no password required</p>
    </div>

    <!-- Nav links to other mockups -->
    <div class="mt-8 pt-6 border-t border-z-border">
      <p class="text-[11px] text-z-muted text-center mb-3 font-medium">MOCKUP NAVIGATION</p>
      <div class="flex gap-2 flex-wrap justify-center">
        <a href="01-login.html" class="text-xs px-3 py-1.5 rounded-lg bg-z-green text-white font-medium">Login</a>
        <a href="02-sa-dashboard.html" class="text-xs px-3 py-1.5 rounded-lg bg-z-page border border-z-border text-z-navy font-medium hover:border-z-green transition-colors">SA Dashboard</a>
        <a href="03-sa-project-detail.html" class="text-xs px-3 py-1.5 rounded-lg bg-z-page border border-z-border text-z-navy font-medium hover:border-z-green transition-colors">Project Detail</a>
        <a href="04-admin-dashboard.html" class="text-xs px-3 py-1.5 rounded-lg bg-z-page border border-z-border text-z-navy font-medium hover:border-z-green transition-colors">Admin</a>
      </div>
    </div>
  </div>

</body>
</html>
