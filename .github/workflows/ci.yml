name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run linting
      run: npm run lint
      
    - name: Build Next.js app
      run: npm run build
      env:
        # Prisma requires a DATABASE_URL for build even if it's just dummy
        DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
