name: Build and Deploy to Cloud Run

on:
  push:
    branches:
      - main

env:
  # Base Configuration
  SERVICE: zippy-app
  
  # GitHub Secrets needed
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ secrets.GCP_REGION }}
  GAR_LOCATION: ${{ secrets.GCP_REGION }}
  GAR_REPOSITORY: ${{ secrets.GAR_REPOSITORY }}
  WORKLOAD_IDENTITY_PROVIDER: 'projects/625176430099/locations/global/workloadIdentityPools/github-actions-pool/providers/github-actions-provider'
  SERVICE_ACCOUNT: 'github-actions-deployer@zippy-cloud-native.iam.gserviceaccount.com'

jobs:
  deploy:
    # Required for Workload Identity Federation
    permissions:
      contents: 'read'
      id-token: 'write'

    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: 'access_token'
          workload_identity_provider: '${{ env.WORKLOAD_IDENTITY_PROVIDER }}'
          service_account: '${{ env.SERVICE_ACCOUNT }}'

      - name: Authenticate Docker to Artifact Registry
        id: docker-auth
        uses: docker/login-action@v3
        with:
          registry: '${{ env.GAR_LOCATION }}-docker.pkg.dev'
          username: 'oauth2accesstoken'
          password: '${{ steps.auth.outputs.access_token }}'

      - name: Build and Push Container
        run: |-
          IMAGE_NAME="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.SERVICE }}:${{ github.sha }}"
          docker build -t $IMAGE_NAME .
          docker push $IMAGE_NAME

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.SERVICE }}:${{ github.sha }}
          env_vars: |
            DATABASE_URL=${{ secrets.DATABASE_URL }}

      - name: Run Database Migrations
        run: DATABASE_URL=${{ secrets.DATABASE_URL }} npx prisma migrate deploy

      - name: Show Deployed App URL
        run: echo "Successfully deployed to ${{ steps.deploy.outputs.url }}"
